# Shamu CI — lint + typecheck + test across ubuntu/macos.
#
# Context (PLAN.md § "Core architecture → 10. Quality gate" + Phase 5.C):
#   - This workflow is the agent-ci target discovered locally via
#     `agent-ci.yml` at the repo root (dogfood marker, not a consumed config).
#     `bun run agent-ci` resolves this file through `@redwoodjs/agent-ci`'s
#     `--all` discovery and runs the ubuntu-latest matrix entry.
#   - The job name `CI / ubuntu-latest` is the required status check referenced
#     by `scripts/setup-branch-protection.sh` — renaming it breaks the gate.
#   - This workflow validates the ORCHESTRATOR'S OWN repo. Shamu itself is
#     dev-laptop-only (PLAN.md decisions: "Never runs inside GitHub Actions");
#     nothing here runs shamu against user code.
#
# Action pinning:
#   Third-party actions are pinned to SHAs (comments show the version tag
#   they correspond to) per PLAN's G9 supply-chain rules. Updating a pin
#   requires re-resolving the SHA via `gh api repos/<owner>/<repo>/git/ref/tags/<tag>`.

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      # actions/checkout@v4 -> 34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bun
        # oven-sh/setup-bun@v2 -> 0c5077e51419868618aeaa5fe8019c62421857d6
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Upload vitest JUnit (on failure)
        if: failure()
        # actions/upload-artifact@v4 -> ea165f8d65b6e75b540449e92b4886f43607fa02
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vitest-junit-${{ matrix.os }}
          path: |
            coverage/junit.xml
            **/coverage/junit.xml
          if-no-files-found: ignore
          retention-days: 7

  # Phase 7.G: fan the shared contract suite across every adapter so a
  # regression in one adapter's scripted driver shows up as its own red
  # job rather than being buried in the umbrella `test` step above.
  #
  # Job name template `contract:<vendor>` maps 1:1 to the 17-scenario
  # contract suite registered by `runAdapterContractSuite(...)` inside
  # each adapter's `test/contract.test.ts`. The umbrella `CI / ubuntu-latest`
  # job above still runs the full workspace test graph — this matrix is
  # purely additive (faster feedback, clearer failure attribution).
  #
  # NOTE: this job is intentionally NOT added to branch-protection's
  # required status checks; the sole required check is `CI / ubuntu-latest`.
  # Adding / removing adapters doesn't require a branch-protection change.
  contract:
    name: contract:${{ matrix.adapter }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter: [echo, claude, codex, opencode, cursor, gemini, amp, pi]
    steps:
      # actions/checkout@v4 -> 34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bun
        # oven-sh/setup-bun@v2 -> 0c5077e51419868618aeaa5fe8019c62421857d6
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Contract suite (@shamu/adapter-${{ matrix.adapter }})
        run: bun run test --filter @shamu/adapter-${{ matrix.adapter }}
