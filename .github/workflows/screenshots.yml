# Shamu web-dashboard screenshot CI.
#
# Context (PLAN.md § Phase 8.C — screenshot CI; Track 8.C.3):
#   Every PR gets a headless-browser screenshot pass of the @shamu/web
#   dashboard so reviewers can eyeball the UI delta without booting the app
#   locally. Not a required status check — this is informational. Branch
#   protection (`scripts/setup-branch-protection.sh`) pins only
#   `CI / ubuntu-latest` as required; this workflow is additive.
#
# Action pinning: mirrors `ci.yml`. Third-party actions are pinned to SHAs
# with the resolved tag in a comment, per PLAN G9 supply-chain rules.

name: Screenshots

on:
  pull_request:

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture:
    # IMPORTANT: this job is intentionally NOT added to branch-protection's
    # required status checks. Screenshot capture is informational only; a
    # failure here (e.g. transient Playwright download hiccup) shouldn't
    # block a PR merge.
    name: web-dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # actions/checkout@v4 -> 34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bun
        # oven-sh/setup-bun@v2 -> 0c5077e51419868618aeaa5fe8019c62421857d6
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build web client bundle
        run: bun apps/web/scripts/build-client.ts

      - name: Install Playwright Chromium
        # Pre-warms the Chromium binary cache so the capture script doesn't
        # pay the ~500MB download cost per shot. Pinned to the same version
        # the capture script invokes at runtime (`PLAYWRIGHT_PIN`).
        run: bunx -y playwright@1.50.1 install --with-deps chromium

      - name: Capture screenshots
        run: bun scripts/capture-web-screenshots.ts --outdir=./screenshots

      - name: Upload screenshots artifact
        # actions/upload-artifact@v4 -> ea165f8d65b6e75b540449e92b4886f43607fa02
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: web-screenshots-${{ github.event.pull_request.number }}
          path: ./screenshots/
          if-no-files-found: warn
          retention-days: 14
